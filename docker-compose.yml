version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: rhulani-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_in_prod
      MYSQL_DATABASE: rhulanituckshop
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: strong_password_change_in_prod
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/db-schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhulani-network

  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: rhulani-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhulani-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhulani-pos
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: rhulanituckshop
      DATABASE_USER: pos_user
      DATABASE_PASSWORD: strong_password_change_in_prod
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:-change_in_production}
      JWT_SECRET: ${JWT_SECRET:-change_in_production}
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - rhulani-network

  # Nginx Reverse Proxy (Optional but recommended for production)
  nginx:
    image: nginx:alpine
    container_name: rhulani-proxy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
    networks:
      - rhulani-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  rhulani-network:
    driver: bridge
